<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>under maintenance</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">    

  <style>
    p{
      font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 50px;
      font-weight: bold;
      text-align: center;
      margin-top: 20px;
    }
    .chocoff{
      color: blue;
      text-decoration: none;
      transition: ease;
    }
    .chocoff:hover{
      font-style: italic;
      text-decoration: underline;
      padding: 10px;
    }
    .btn{
      background-color: blue;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      transition: ease-in-out;
    }
    .btn:hover{
      background-color: white;
      color: blue;
      border: solid;
      border-color: blue;
      border-width: 1px;
      cursor: pointer;
    }
    .btn:active{
      background-color: blue;
      color: white;
    }
    .btn-container{
      display: flex;
      justify-content: center;
    }

  </style>
</head>

<body>
<p>Page <br>under <br>maintenance</p>
<p>Check <a class="chocoff" href="https://github.com/chocoff">chocoff</a> in the meantime :)</p>
<div class="btn-container">
  <a href="https://chocoff.github.io/reforest-ai">
    <button class="btn">test</button>
  </a>
</div>

</body>
</html>
